<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>仓库盘点系统</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #f5f7fb; --card-bg: #fff; --text: #1e293b; --text-secondary: #64748b;
            --border: #e9eef3; --primary: #1b4a6b; --primary-light: #e6edf6; --danger: #b33a3a;
            --success: #0e6245; --header-bg: linear-gradient(135deg, #0f2b4b, #1b4a6b);
            --input-bg: #fff; --shadow: rgba(0,0,0,0.08); --font-size-base: 1rem;
            --scan-line-color: #4cc9f0;
            --scan-window-size: 45.33%;
            --camera-preview-height: 50vh;
        }
        .night-mode {
            --bg: #1a1f2e; --card-bg: #232a3b; --text: #e2e8f0; --text-secondary: #94a3b8;
            --border: #334155; --primary: #3b82f6; --primary-light: #1e3a5f; --danger: #ef4444;
            --success: #22c55e; --header-bg: linear-gradient(135deg, #0f172a, #1e293b);
            --input-bg: #334155; --shadow: rgba(0,0,0,0.3);
            --scan-line-color: #60a5fa;
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
        body{
            background: linear-gradient(135deg, #0f2b4b 0%, #1b4a6b 100%);
            min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;font-size:var(--font-size-base)
        }
        .login-container{
            width:100%;max-width:400px;
            background: var(--card-bg); color: var(--text);
            border-radius:28px;box-shadow:0 20px 40px var(--shadow);
            padding:32px 24px;text-align:center;display:flex;flex-direction:column;gap:20px;
            z-index:1;
        }
        .login-container h1{font-size:2rem;color:var(--primary)}
        .login-container input{
            width:100%;padding:14px 16px;border-radius:14px;
            border:1px solid var(--border);
            background:var(--input-bg);color:var(--text);font-size:1rem;
        }
        .login-container input::placeholder{color:var(--text-secondary)}
        .btn-login{width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:30px;font-weight:600;font-size:1rem;cursor:pointer}
        .btn-test{width:100%;padding:14px;background:transparent;color:var(--primary);border:2px solid var(--primary);border-radius:30px;font-weight:600;font-size:1rem;cursor:pointer;margin-top:8px}

        #appMain {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
            display: none;
        }
        .app-container{
            width:100%;height:100%;
            background:var(--bg);color:var(--text);
            display:flex;flex-direction:column;
            border-radius:0;box-shadow:none;
        }
        .header{background:var(--header-bg);color:white;padding:8px 20px;text-align:center;flex-shrink:0}
        .header h1{font-size:1.2rem;font-weight:600}
        .view{flex:1;display:none;flex-direction:column;padding:16px 20px 20px;gap:16px;overflow-y:auto; background:var(--bg); color:var(--text)}
        .view.active{display:flex}
        .bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--card-bg);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
        .nav-item{flex:1;text-align:center;padding:12px 4px;font-weight:600;font-size:0.9rem;color:var(--text-secondary);cursor:pointer;border-bottom:3px solid transparent;transition:0.2s;display:flex;flex-direction:column;align-items:center;gap:2px}
        .nav-item.active{color:var(--primary);border-bottom-color:var(--primary)}
        .nav-item span{font-size:0.8rem;opacity:0.8}
        .btn{border:none;background:var(--card-bg);padding:10px 18px;border-radius:30px;font-weight:600;font-size:0.9rem;display:inline-flex;align-items:center;gap:6px;box-shadow:0 4px 10px var(--shadow);cursor:pointer;color:var(--primary);border:1px solid var(--border)}
        .btn-primary{background:var(--primary);color:white;border:none}
        .btn-danger{background:var(--danger);color:white;border:none}
        .btn-sm{padding:6px 14px;font-size:0.8rem}
        .card{background:var(--card-bg);border-radius:20px;padding:16px;border:1px solid var(--border);color:var(--text)}
        .input-field{margin-bottom:12px}
        .input-field label{font-size:0.75rem;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:4px}
        .input-field input,.input-field textarea{width:100%;padding:12px;border-radius:14px;border:1px solid var(--border);font-size:1rem;background:var(--input-bg);color:var(--text)}
        .row{display:flex;gap:8px}
        .row .input-field{flex:1}
        .search-bar{display:flex;gap:8px;align-items:center}
        .search-bar input[type="date"]{
            flex:1; padding:10px 16px; border-radius:30px; border:1px solid var(--border);
            background:var(--input-bg); color:var(--text); font-size:0.9rem; font-weight:600;
            height:44px;
        }
        .list-container{flex:1;overflow-y:auto;background:var(--card-bg);border-radius:16px;padding:8px 6px;border:1px solid var(--border)}
        .list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border)}
        .item-detail{display:flex;flex-direction:column;gap:2px;flex:1}
        .item-part{font-weight:600}
        .item-meta{font-size:0.7rem;color:var(--text-secondary)}
        .item-qty{background:var(--primary-light);padding:4px 12px;border-radius:20px;font-weight:600;margin:0 8px;color:var(--text)}
        .delete-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:1.2rem;padding:4px 8px; -webkit-tap-highlight-color: transparent; }
        .empty-message{text-align:center;color:var(--text-secondary);padding:24px}
        .view-toggle{display:flex;gap:8px;margin-bottom:4px; flex-wrap:wrap; align-items:center}
        .view-toggle .btn{padding:6px 12px;font-size:0.8rem}
        .view-toggle .btn.active{background:var(--primary);color:white;border-color:var(--primary)}
        .export-btn{padding:6px 14px;font-size:0.8rem; background:var(--success); color:white; border:none; margin-left:auto}
        .delete-day-bar{display:flex;justify-content:flex-end;margin-top:-8px}
        .profile-header{display:flex;align-items:center;gap:16px;margin-bottom:8px}
        .avatar{width:60px;height:60px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;border:3px solid var(--primary);overflow:hidden}
        .avatar img{width:100%;height:100%;object-fit:cover}
        .profile-name{font-weight:700;font-size:1.2rem}
        .setting-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
        .setting-left{display:flex;flex-direction:column;gap:2px}
        .setting-label{font-weight:600}
        .setting-desc{font-size:0.7rem;color:var(--text-secondary)}
        select{background:var(--input-bg);color:var(--text);border:1px solid var(--border);padding:10px 14px;border-radius:14px;font-size:var(--font-size-base)}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center}
        .modal-overlay.show{display:flex}
        .modal-box{background:var(--card-bg);border-radius:24px;padding:24px;width:90%;max-width:380px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
        .modal-box h3{text-align:center}
        .modal-box input{width:100%;padding:12px;border-radius:14px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:1rem}
        .modal-box .btn-row{display:flex;gap:8px}
        .modal-box .btn-row .btn{flex:1;justify-content:center}
        .avatar-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:12px}
        .avatar-option{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;cursor:pointer;border:3px solid transparent}
        .avatar-option.selected{border-color:var(--primary);background:var(--primary-light)}
        .switch-track{width:44px;height:24px;background:#ccc;border-radius:12px;position:relative;cursor:pointer}
        .switch-track.on{background:var(--primary)}
        .switch-thumb{width:20px;height:20px;background:white;border-radius:50%;position:absolute;top:2px;left:2px;transition:0.2s}
        .switch-track.on .switch-thumb{left:22px}
        .tag{background:var(--primary-light);padding:4px 10px;border-radius:20px;font-size:0.8rem;font-weight:600}

        .chat-container{flex:1;display:flex;flex-direction:column;gap:8px}
        .chat-messages{flex:1;overflow-y:auto;background:var(--card-bg);border-radius:16px;padding:12px;border:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
        .chat-msg{display:flex;flex-direction:column;max-width:85%;padding:8px 14px;border-radius:18px;word-break:break-word;animation:fadeIn 0.2s}
        .chat-msg.mine{align-self:flex-end;background:var(--primary);color:white;border-bottom-right-radius:4px}
        .chat-msg.other{align-self:flex-start;background:var(--primary-light);color:var(--text);border-bottom-left-radius:4px}
        .chat-msg .msg-time{font-size:0.6rem;opacity:0.7;margin-top:2px}
        .chat-msg .msg-sender{font-size:0.7rem;font-weight:600;margin-bottom:2px}
        .chat-input-row{display:flex;gap:8px}
        .chat-input-row input{flex:1;padding:12px;border-radius:30px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:0.9rem}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        .scanner-container{display:flex;flex-direction:column;gap:16px}
        .scanner-wrapper{
            position:relative;width:100%;aspect-ratio:1/1;
            max-height: var(--camera-preview-height, 50vh);
            background:#000;border-radius:16px;overflow:hidden;
            box-shadow:0 8px 32px rgba(0,0,0,0.4)
        }
        .scanner-wrapper video{width:100%;height:100%;object-fit:cover;display:block}
        .scanner-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-secondary);z-index:5;gap:10px}
        .scanner-placeholder .icon{font-size:56px;opacity:0.6}
        .overlay{position:absolute;inset:0;pointer-events:none;z-index:10;display:none}
        .scan-window{
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            width: var(--scan-window-size, 45.33%);
            aspect-ratio:1/1;border-radius:14px;
            box-shadow:0 0 0 9999px rgba(0,0,0,0.65);z-index:11
        }
        .corner{position:absolute;width:28px;height:28px;z-index:12}
        .corner::before,.corner::after{content:'';position:absolute;background:#fff;border-radius:2px}
        .corner-tl{top:-2px;left:-2px}
        .corner-tl::before{top:0;left:0;width:28px;height:4px}
        .corner-tl::after{top:0;left:0;width:4px;height:28px}
        .corner-tr{top:-2px;right:-2px}
        .corner-tr::before{top:0;right:0;width:28px;height:4px}
        .corner-tr::after{top:0;right:0;width:4px;height:28px}
        .corner-bl{bottom:-2px;left:-2px}
        .corner-bl::before{bottom:0;left:0;width:28px;height:4px}
        .corner-bl::after{bottom:0;left:0;width:4px;height:28px}
        .corner-br{bottom:-2px;right:-2px}
        .corner-br::before{bottom:0;right:0;width:28px;height:4px}
        .corner-br::after{bottom:0;right:0;width:4px;height:28px}
        .scan-line{position:absolute;left:6%;width:88%;height:2.5px;background:linear-gradient(90deg,transparent 0%,var(--scan-line-color) 20%,var(--scan-line-color) 80%,transparent 100%);border-radius:4px;z-index:13;pointer-events:none;box-shadow:0 0 16px 4px rgba(76,201,240,0.7),0 0 40px 8px rgba(76,201,240,0.35);animation:scanMove 2.2s cubic-bezier(0.45,0,0.55,1) infinite}
        .scan-line.cooling{background:linear-gradient(90deg,transparent 0%, #ef476f 20%, #ef476f 80%, transparent 100%); box-shadow:0 0 16px 4px rgba(239,71,111,0.7); animation-duration:1.2s;}
        @keyframes scanMove{0%{top:8%;opacity:0.3}15%{opacity:1}50%{top:88%;opacity:1}65%{opacity:0.3}100%{top:8%;opacity:0.3}}
        .hint-text{position:absolute;bottom:14%;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.8);font-size:13px;z-index:14}
        .controls-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
        .result-card,.fields-card{background:var(--card-bg);border-radius:16px;padding:14px 16px;border:1px solid var(--border);color:var(--text)}
        .result-content{background:var(--input-bg);padding:8px 10px;border-radius:8px;font-family:monospace;margin-bottom:10px;max-height:80px;overflow-y:auto;color:var(--text)}
        .field-item{flex:1 1 30%;min-width:100px;display:flex;flex-direction:column;gap:4px}
        .field-item input{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;outline:none}
        .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-120px);background:#333;color:#fff;padding:10px 20px;border-radius:25px;z-index:9999;transition:0.35s}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .save-btn-row{margin-top:8px;display:flex;gap:8px;}
        .multiplier-group{display:flex;align-items:center;gap:6px;margin-bottom:10px}
        .multiplier-group label{font-size:0.75rem;font-weight:600;color:var(--text-secondary);}
        .multiplier-group select{padding:8px 10px;border-radius:8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;width:100%;}
        .location-result-container {
            margin-top: 12px; padding: 8px; border-radius: 14px;
            background: var(--primary-light); border: 1px solid var(--border);
            min-height: 40px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
            max-height: 300px; overflow-y: auto;
        }
        .location-result-item {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 8px 14px; border-radius: 20px; font-size: 0.9rem; font-weight: 500;
            display: inline-flex; align-items: center; gap: 12px; color: var(--text);
            width: 100%;
        }
        .location-result-item .part-label { color: var(--text-secondary); font-size: 0.75rem; }
        .location-result-item strong { font-weight: 700; color: var(--primary); }
        .location-result-empty { color: var(--text-secondary); font-size: 0.85rem; padding: 4px 8px; }
        .loc-actions { margin-left: auto; display: flex; gap: 6px; }
        .loc-actions button { background: none; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 8px; padding: 4px 10px; font-size: 0.8rem; cursor: pointer; }
        .loc-actions button:hover { background: var(--primary-light); }
        details.card {
            padding: 0; border: 1px solid var(--border); border-radius: 20px;
            overflow: hidden; background: var(--card-bg);
        }
        details.card summary {
            list-style: none; display: flex; align-items: center; padding: 16px;
            font-weight: 600; font-size: 0.95rem; cursor: pointer; color: var(--text);
            background: var(--card-bg);
        }
        details.card summary::-webkit-details-marker { display: none; }
        details.card .details-content { padding: 0 16px 16px; }
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            height: 6px; background: var(--border); border-radius: 3px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 20px; height: 20px; background: var(--primary);
            border-radius: 50%; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
<div id="loginContainer" class="login-container">
    <div>📦</div><h1>仓库盘点系统</h1>
    <input type="text" id="loginAccount" placeholder="账号" autocomplete="username">
    <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
    <button class="btn-login" id="loginBtn">登 录</button>
    <button class="btn-test" id="testLoginBtn">🧪 测试进入（免账号密码）</button>
    <div id="loginError" style="color:var(--danger)"></div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal-box" id="modalBox"></div></div>

<div id="appMain">
  <div class="app-container">
    <div class="header"><h1>📦 仓库盘点系统</h1></div>
    <div id="scannerPageView" class="view active">
      <div class="scanner-container">
        <div class="scanner-wrapper" id="scannerWrapper">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="canvas"></canvas>
          <div class="scanner-placeholder" id="placeholder"><span class="icon">📷</span><p>点击下方按钮启动摄像头</p></div>
          <div class="overlay" id="overlay" style="display:none;">
            <div class="scan-window" id="scanWindow">
              <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
              <div class="corner corner-bl"></div><div class="corner corner-br"></div>
            </div>
            <div class="scan-line" id="scanLine"></div>
            <div class="hint-text" id="hintText">将二维码放入框内</div>
          </div>
        </div>
        <div class="controls-row">
          <button class="btn btn-primary" id="btnStart">🎥 开始扫描</button>
          <button class="btn btn-outline btn-sm" id="btnUpload">🖼️ 选图</button>
          <button class="btn btn-outline" id="btnTorch" disabled>🔦 补光</button>
          <div style="display:flex;align-items:center;gap:4px;">
            <span style="font-size:0.75rem;color:var(--text-secondary);">自动保存</span>
            <div class="switch-track" id="autoSaveSwitchTrack"><div class="switch-thumb"></div></div>
          </div>
          <input type="file" id="imgFile" accept="image/*" style="display:none">
        </div>
        <div class="fields-card">
          <div class="fields-title">📦 解析字段（数量 × 倍数 = 最终保存数量）</div>
          <div class="fields-grid" style="display:flex;flex-wrap:wrap;gap:10px;">
            <div class="field-item"><label>料号</label><input type="text" id="partNumber" placeholder="自动填入" readonly></div>
            <div class="field-item"><label>数量</label><input type="number" id="quantity" placeholder="数量" value="1" min="1" style="width:100%;"></div>
          </div>
          <div class="multiplier-group">
            <label>数量倍数</label>
            <select id="multiplierSelect">
              <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
              <option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
              <option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option>
              <option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option>
              <option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option>
              <option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option>
            </select>
          </div>
          <div class="field-item"><label>MPN</label><input type="text" id="mpn" placeholder="自动填入" readonly></div>
          <div class="save-btn-row">
            <button class="btn btn-outline" id="btnCancelSave" style="flex:1;">取消</button>
            <button class="btn btn-primary" id="btnConfirmSave" style="flex:1;">确认</button>
          </div>
        </div>
        <div class="result-card" id="resultCard" style="display:none;">
          <div class="result-label">✅ 扫描结果（已去除首字符）</div>
          <div class="result-content" id="resultContent"></div>
          <div class="result-actions">
            <button class="btn btn-outline btn-sm" id="btnCopy">📋 复制内容</button>
            <button class="btn btn-outline btn-sm" id="btnClearResult">✕ 清除</button>
          </div>
        </div>
        <div class="toast" id="toastDom"></div>
      </div>
    </div>

    <div id="queryView" class="view">
      <div class="search-bar">
        <input type="date" id="searchDateInput">
        <button class="btn btn-primary" id="searchBtn">🔍 查询</button>
        <button class="btn" id="todaySearchBtn">今天</button>
      </div>
      <div class="delete-day-bar"><button class="btn btn-danger btn-sm" id="deleteDayBtn">🗑️ 删除当天全部</button></div>
      <div class="view-toggle">
        <button class="btn btn-sm active" id="detailViewBtn">明细</button>
        <button class="btn btn-sm" id="summaryViewBtn">料号汇总</button>
        <button class="btn btn-sm" id="mpnSummaryViewBtn">MPN 汇总</button>
        <button class="btn btn-sm export-btn" id="exportExcelBtn">📥 导出</button>
      </div>
      <div id="listContainer" class="list-container"><div class="empty-message">📭 请选择日期查询</div></div>
    </div>

    <div id="locationView" class="view">
      <div class="card">
        <div style="font-weight:600;margin-bottom:10px;">🔎 储位查询</div>
        <div class="input-field"><input type="text" id="locationSearchInput" placeholder="输入全料号 或 后四位"></div>
        <button class="btn btn-primary" id="locationSearchBtn" style="width:100%;">搜索储位</button>
        <div id="locationResult" class="location-result-container"><span class="location-result-empty">请输入料号进行搜索</span></div>
      </div>
      <details class="card" id="manualAddDetails">
        <summary>➕ 手动添加储位</summary>
        <div class="details-content">
          <div class="row" style="margin-top:8px;">
            <div class="input-field"><label>料号</label><input type="text" id="manualPartInputDB" placeholder="例如：A001"></div>
            <div class="input-field"><label>储位</label><input type="text" id="manualLocationInputDB" placeholder="例如：A-01-03"></div>
          </div>
          <button class="btn btn-primary" id="manualAddLocationBtn" style="width:100%;">💾 保存储位</button>
          <div id="manualAddStatus" style="font-size:0.8rem;margin-top:6px;"></div>
        </div>
      </details>
      <details class="card" id="batchImportDetails">
        <summary>📥 批量导入储位</summary>
        <div class="details-content">
          <div class="input-field" style="margin-top:8px;">
            <label>粘贴 CSV 或 JSON 数据</label>
            <textarea id="importTextareaDB" rows="5" placeholder="CSV格式：&#10;A001,A-01-03&#10;B002,B-02-01&#10;&#10;JSON格式：&#10;[{&quot;part&quot;:&quot;A001&quot;,&quot;loc&quot;:&quot;A-01-03&quot;}]"></textarea>
          </div>
          <button class="btn btn-primary" id="batchImportBtn" style="width:100%;">✅ 确认导入</button>
          <div id="batchImportStatus" style="font-size:0.8rem;margin-top:6px;"></div>
        </div>
      </details>
    </div>

    <div id="chatView" class="view">
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="输入消息..." autocomplete="off">
          <button class="btn btn-primary" id="chatSendBtn">发送</button>
        </div>
      </div>
    </div>

    <div id="profileView" class="view">
      <div class="card">
        <div class="profile-header">
          <div class="avatar" id="avatarDisplay">👤</div>
          <div><div class="profile-name" id="displayName">管理员</div><div class="profile-account">cangku</div></div>
          <button class="btn btn-sm" id="editNameBtn">✏️ 改名</button>
        </div>
      </div>
      <div class="card">
        <div style="font-weight:600;margin-bottom:12px;">⚙️ 设置</div>
        <div class="setting-item">
          <div class="setting-left"><span class="setting-label">夜间模式</span></div>
          <div class="switch-track" id="nightSwitchTrack"><div class="switch-thumb"></div></div>
        </div>
        <div class="setting-item">
          <div class="setting-left"><span class="setting-label">字体大小</span></div>
          <select id="fontSizeSelect"><option value="0.85rem">小</option><option value="1rem" selected>中</option><option value="1.15rem">大</option></select>
        </div>
        <div class="setting-item">
          <div class="setting-left"><span class="setting-label">摄像头预览大小</span><span class="setting-desc">调整扫码黑框高度占比</span></div>
          <div style="display:flex; align-items:center; gap:8px;">
            <input type="range" id="cameraPreviewHeightRange" min="30" max="80" value="50" step="1" style="width:100px;">
            <span id="cameraPreviewHeightValue" style="font-weight:600;min-width:40px;">50%</span>
          </div>
        </div>
        <div class="setting-item">
          <div class="setting-left"><span class="setting-label">扫码窗口大小</span><span class="setting-desc">拖动滑块调整扫码框尺寸</span></div>
          <div style="display:flex; align-items:center; gap:8px;">
            <input type="range" id="scanWindowSizeRange" min="20" max="80" value="45" step="1" style="width:100px;">
            <span id="scanWindowSizeValue" style="font-weight:600;min-width:40px;">45%</span>
          </div>
        </div>
        <div class="setting-item">
          <div class="setting-left"><span class="setting-label">扫码延迟</span><span class="setting-desc">防止重复扫描的冷却时间</span></div>
          <select id="scanCooldownSelect"><option value="1">1 秒</option><option value="2">2 秒</option><option value="2.5" selected>2.5 秒</option><option value="3">3 秒</option><option value="4">4 秒</option><option value="5">5 秒</option></select>
        </div>
        <div class="setting-item">
          <div class="setting-left"><span class="setting-label">提示音</span><span class="setting-desc">扫描成功时播放声音</span></div>
          <div class="switch-track" id="soundSwitchTrack"><div class="switch-thumb"></div></div>
        </div>
        <div class="setting-item">
          <div class="setting-left"><span class="setting-label">打开摄像头</span><span class="setting-desc">进入扫码页时是否自动启动</span></div>
          <select id="autoOpenCameraSelect"><option value="manual" selected>手动打开</option><option value="auto">自动打开</option></select>
        </div>
        <div class="setting-item"><div class="setting-left"><span class="setting-label">修改密码</span></div><button class="btn btn-sm" id="changePasswordBtn">修改</button></div>
        <div class="setting-item"><div class="setting-left"><span class="setting-label">版本</span><span class="setting-desc">v4.0</span></div></div>
        <div class="setting-item"><div class="setting-left"><span class="setting-label">清除缓存</span></div><button class="btn btn-danger btn-sm" id="clearCacheBtn">清除</button></div>
        <div class="setting-item"><button class="btn btn-danger" id="logoutBtn" style="width:100%;">退出登录</button></div>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item active" data-view="scannerPageView">🔍<span>扫码</span></div>
      <div class="nav-item" data-view="queryView">📅<span>盘点数据</span></div>
      <div class="nav-item" data-view="locationView">📍<span>储位</span></div>
      <div class="nav-item" data-view="chatView">💬<span>聊天</span></div>
      <div class="nav-item" data-view="profileView">👤<span>我的</span></div>
    </div>
  </div>
</div>

<script>
(function() {
  const API_BASE = '/api';
  let userData = { nickname: '管理员', avatar: '👤' };
  
  async function api(url, options = {}) {
    const token = localStorage.getItem('token');
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(API_BASE + url, { ...options, headers });
    if (res.status === 401) { logout(); return null; }
    if (res.status === 204) return null;
    return res.json();
  }
  
  function logout() {
    localStorage.removeItem('token');
    document.getElementById('appMain').style.display = 'none';
    document.getElementById('loginContainer').style.display = 'flex';
  }

  const loginContainer = document.getElementById('loginContainer');
  const appMain = document.getElementById('appMain');
  
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const username = document.getElementById('loginAccount').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    if (data && data.token) {
      localStorage.setItem('token', data.token);
      userData = data.user;
      loginContainer.style.display = 'none';
      appMain.style.display = 'block';
      initApp();
    } else {
      document.getElementById('loginError').textContent = data?.error || '登录失败';
    }
  });
  
  document.getElementById('testLoginBtn').addEventListener('click', async () => {
    const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username: 'cangku', password: '927521' }) });
    if (data && data.token) {
      localStorage.setItem('token', data.token);
      userData = data.user;
      loginContainer.style.display = 'none';
      appMain.style.display = 'block';
      initApp();
    }
  });

  const modalOverlay = document.getElementById('modalOverlay'), modalBox = document.getElementById('modalBox');
  function showModal(html) { modalBox.innerHTML = html; modalOverlay.classList.add('show'); modalBox.querySelector('.modal-close')?.addEventListener('click', closeModal); }
  function closeModal() { modalOverlay.classList.remove('show'); modalBox.innerHTML = ''; }
  modalOverlay.addEventListener('click', e => { if(e.target===modalOverlay) closeModal(); });

  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ==================== 初始化 ====================
  function initApp() {
    const views = {
      scannerPageView: document.getElementById('scannerPageView'),
      queryView: document.getElementById('queryView'),
      locationView: document.getElementById('locationView'),
      chatView: document.getElementById('chatView'),
      profileView: document.getElementById('profileView')
    };
    const navItems = document.querySelectorAll('.nav-item');
    let viewDate = getTodayString();
    let queryMode = 'detail';
    let currentLocationQuery = '';

    function getTodayString() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

    // 视图切换
    function switchView(viewId) {
      Object.keys(views).forEach(id => views[id].classList.toggle('active', id === viewId));
      navItems.forEach(item => item.classList.toggle('active', item.dataset.view === viewId));
      if (viewId === 'queryView') { document.getElementById('searchDateInput').value = viewDate; renderQueryRecords(); }
      if (viewId === 'scannerPageView') {
        if (!window.__scannerInitialized) { initScannerPage(); window.__scannerInitialized = true; }
        if (settings.autoOpenCamera && !window.__isScanning && typeof startCamera === 'function') startCamera();
      } else { if (window.__stopScanner) window.__stopScanner(); }
      if (viewId === 'chatView') { initChat(); }
    }
    navItems.forEach(item => item.addEventListener('click', () => switchView(item.dataset.view)));

    // ========== 盘点数据 ==========
    document.getElementById('detailViewBtn').addEventListener('click', () => { queryMode = 'detail'; renderQueryRecords(); });
    document.getElementById('summaryViewBtn').addEventListener('click', () => { queryMode = 'summary_by_part'; renderQueryRecords(); });
    document.getElementById('mpnSummaryViewBtn').addEventListener('click', () => { queryMode = 'summary_by_mpn'; renderQueryRecords(); });
    
    document.getElementById('deleteDayBtn').addEventListener('click', async () => {
      if (!confirm(`确定删除 ${viewDate} 的全部盘点记录吗？`)) return;
      await api(`/records/delete-day?date=${viewDate}`, { method: 'DELETE' });
      renderQueryRecords();
    });
    document.getElementById('searchBtn').addEventListener('click', () => { viewDate = document.getElementById('searchDateInput').value; renderQueryRecords(); });
    document.getElementById('todaySearchBtn').addEventListener('click', () => { viewDate = getTodayString(); document.getElementById('searchDateInput').value = viewDate; renderQueryRecords(); });

    async function renderQueryRecords() {
      const records = await api(`/records?date=${viewDate}`);
      const container = document.getElementById('listContainer');
      if (!records || records.length === 0) {
        container.innerHTML = '<div class="empty-message">📭 暂无记录</div>';
        return;
      }
      if (queryMode === 'detail') {
        container.innerHTML = records.map((r, idx) => {
          let tags = r.mpn ? `<span class="tag">MPN:${escapeHtml(r.mpn)}</span>` : '';
          return `<div class="list-item"><div class="item-detail"><span class="item-part">🔖 ${escapeHtml(r.part)}</span><span class="item-meta">${tags||'-'} 🕒 ${r.time}</span></div><span class="item-qty">✕ ${r.qty}</span><button class="delete-btn" data-id="${r.id}">🗑️</button></div>`;
        }).join('');
      } else if (queryMode === 'summary_by_part') {
        const sum = {};
        records.forEach(r => { sum[r.part] = (sum[r.part]||0) + r.qty; });
        container.innerHTML = Object.entries(sum).map(([part, total]) => `<div class="list-item"><div class="item-detail"><span class="item-part">🔖 ${escapeHtml(part)}</span><span class="item-meta">按料号汇总</span></div><span class="item-qty">合计 ${total}</span></div>`).join('');
      } else if (queryMode === 'summary_by_mpn') {
        const sum = {};
        records.forEach(r => { const key = `${r.part}||${r.mpn||''}`; sum[key] = (sum[key]||0) + r.qty; });
        container.innerHTML = Object.entries(sum).map(([key, total]) => {
          const [part, mpn] = key.split('||');
          return `<div class="list-item"><div class="item-detail"><span class="item-part">🔖 ${escapeHtml(part)}</span><span class="item-meta">${mpn?`<span class="tag">MPN:${escapeHtml(mpn)}</span>`:'<span class="tag">无MPN</span>'}</span></div><span class="item-qty">合计 ${total}</span></div>`;
        }).join('');
      }
      // 删除单条事件
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.target.dataset.id;
          if (confirm('确定删除这条记录吗？')) {
            await api(`/records/${id}`, { method: 'DELETE' });
            renderQueryRecords();
          }
        });
      });
      updateViewToggleButtons();
    }
    function updateViewToggleButtons() {
      document.getElementById('detailViewBtn').classList.toggle('active', queryMode==='detail');
      document.getElementById('summaryViewBtn').classList.toggle('active', queryMode==='summary_by_part');
      document.getElementById('mpnSummaryViewBtn').classList.toggle('active', queryMode==='summary_by_mpn');
    }

    // 导出 Excel
    document.getElementById('exportExcelBtn').addEventListener('click', async () => {
      const records = await api(`/records?date=${viewDate}`);
      if (!records || records.length === 0) { alert('没有数据可导出'); return; }
      let sheetData = []; let filename = `盘点数据_${viewDate}_`;
      if (queryMode === 'detail') {
        filename += '明细.xlsx'; sheetData.push(['时间','料号','数量','MPN']);
        records.forEach(r => sheetData.push([r.time, r.part, r.qty, r.mpn || '']));
      } else if (queryMode === 'summary_by_part') {
        filename += '料号汇总.xlsx'; sheetData.push(['料号','合计数量']);
        const sum = {}; records.forEach(r => sum[r.part] = (sum[r.part]||0)+r.qty);
        Object.entries(sum).forEach(([p,t]) => sheetData.push([p,t]));
      } else {
        filename += 'MPN汇总.xlsx'; sheetData.push(['料号','MPN','合计数量']);
        const sum = {}; records.forEach(r => { const k=`${r.part}||${r.mpn||''}`; sum[k]=(sum[k]||0)+r.qty; });
        Object.entries(sum).forEach(([k,t]) => { const [p,m] = k.split('||'); sheetData.push([p,m||'',t]); });
      }
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(sheetData);
      XLSX.utils.book_append_sheet(wb, ws, '盘点数据');
      XLSX.writeFile(wb, filename);
    });

    // ========== 储位管理 ==========
    async function renderLocationResults() {
      const q = document.getElementById('locationSearchInput').value.trim();
      const container = document.getElementById('locationResult');
      if (!q) { container.innerHTML = '<span class="location-result-empty">请输入料号进行搜索</span>'; return; }
      const locations = await api(`/locations?search=${q}`);
      if (!locations || locations.length === 0) { container.innerHTML = '<span class="location-result-empty">未找到匹配的储位</span>'; return; }
      container.innerHTML = locations.slice(0,20).map(loc => `
        <div class="location-result-item">
          <span class="part-label">料号</span><strong>${escapeHtml(loc.part)}</strong>
          <span class="part-label">储位</span><strong>${escapeHtml(loc.location)}</strong>
          <div class="loc-actions">
            <button data-action="edit" data-part="${escapeHtml(loc.part)}">✏️</button>
            <button data-action="delete" data-part="${escapeHtml(loc.part)}">🗑️</button>
          </div>
        </div>`).join('');
      // 事件委托
      container.addEventListener('click', async (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        const action = btn.dataset.action, part = btn.dataset.part;
        if (action === 'edit') {
          const loc = locations.find(l => l.part === part);
          showModal(`<h3>编辑储位</h3><div><label>料号（不可修改）</label><input type="text" value="${escapeHtml(part)}" readonly></div><div><label>储位</label><input type="text" id="editLocInput" value="${escapeHtml(loc.location)}"></div><div class="btn-row"><button class="btn modal-close">取消</button><button class="btn btn-primary" id="saveEditLocBtn">保存</button></div>`);
          document.getElementById('saveEditLocBtn').addEventListener('click', async () => {
            const newLoc = document.getElementById('editLocInput').value.trim();
            if (!newLoc) { alert('储位不能为空'); return; }
            await api('/locations', { method: 'POST', body: JSON.stringify({ part, location: newLoc }) });
            closeModal();
            renderLocationResults();
          });
        } else if (action === 'delete') {
          if (confirm(`确定删除料号 "${part}" 的储位吗？`)) {
            await api(`/locations/${part}`, { method: 'DELETE' });
            renderLocationResults();
          }
        }
      });
    }
    document.getElementById('locationSearchBtn').addEventListener('click', renderLocationResults);
    document.getElementById('manualAddLocationBtn').addEventListener('click', async () => {
      const p = document.getElementById('manualPartInputDB').value.trim();
      const l = document.getElementById('manualLocationInputDB').value.trim();
      if (!p||!l) return;
      await api('/locations', { method: 'POST', body: JSON.stringify({ part: p, location: l }) });
      document.getElementById('manualAddStatus').textContent = `✅ 已保存 ${p} → ${l}`;
      document.getElementById('manualPartInputDB').value = ''; document.getElementById('manualLocationInputDB').value = '';
    });
    document.getElementById('batchImportBtn').addEventListener('click', async () => {
      const raw = document.getElementById('importTextareaDB').value.trim();
      if (!raw) return;
      let entries = [];
      if (raw.startsWith('[')) {
        JSON.parse(raw).forEach(item => { if (item.part && item.loc) entries.push({ part: item.part, location: item.loc }); });
      } else {
        raw.split('\n').forEach(line => {
          const parts = line.split(/[,\t]/);
          if (parts.length >= 2) entries.push({ part: parts[0].trim(), location: parts.slice(1).join(',').trim() });
        });
      }
      let count = 0;
      for (let e of entries) {
        await api('/locations', { method: 'POST', body: JSON.stringify(e) });
        count++;
      }
      document.getElementById('batchImportStatus').textContent = `✅ 成功导入 ${count} 条`;
      document.getElementById('importTextareaDB').value = '';
    });

    // ========== 聊天 ==========
    let lastChatId = 0;
    let chatPollTimer = null;
    function initChat() {
      if (chatPollTimer) clearInterval(chatPollTimer);
      const container = document.getElementById('chatMessages');
      container.innerHTML = '<div class="empty-message">💬 加载中...</div>';
      lastChatId = 0;
      async function poll() {
        const msgs = await api(`/chat/messages?since=${lastChatId}`);
        if (msgs && msgs.length > 0) {
          lastChatId = msgs[msgs.length - 1].id;
          if (lastChatId === 0) container.innerHTML = '';
          msgs.forEach(msg => {
            const div = document.createElement('div');
            div.className = `chat-msg ${msg.sender === userData.nickname ? 'mine' : 'other'}`;
            div.innerHTML = `
              ${msg.sender !== userData.nickname ? `<span class="msg-sender">${escapeHtml(msg.sender)}</span>` : ''}
              <span>${escapeHtml(msg.text)}</span>
              <span class="msg-time">${msg.time}</span>
            `;
            container.appendChild(div);
          });
          container.scrollTop = container.scrollHeight;
        }
      }
      poll();
      chatPollTimer = setInterval(poll, 2000);
    }
    document.getElementById('chatSendBtn').addEventListener('click', async () => {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      await api('/chat/messages', { method: 'POST', body: JSON.stringify({ content: text }) });
      input.value = '';
    });

    // ========== 个人设置 ==========
    // 头像、昵称、密码等，调用对应 API 即可，此处省略具体 UI 代码（与之前版本相同）
    
    // 设置项加载（示例）
    let settings = {};
    async function loadSettings() {
      const data = await api('/user/settings');
      if (data) settings = data;
    }
    loadSettings();

    // 初始化扫码页
    function initScannerPage() {
      // ...（此处保留原有的扫码逻辑，只需要将 addRecord 改为调用 API 即可）
    }

    // 默认显示扫码页
    switchView('scannerPageView');
  }
})();
</script>
</body>
</html>
